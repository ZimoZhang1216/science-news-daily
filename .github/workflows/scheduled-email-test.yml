name: Scheduled Email Test

on:
  schedule:
    # Temporary email test for 2026-05-07 10:36 Asia/Shanghai = 02:36 UTC.
    # Remove this workflow after confirming the scheduled email run.
    - cron: "36 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  send:
    name: Generate and email reports
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '36 2 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EMAIL_ENABLED: "true"
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      CHEM_REPORT_EMAIL_TO: ${{ secrets.CHEM_REPORT_EMAIL_TO }}
      BIO_REPORT_EMAIL_TO: ${{ secrets.BIO_REPORT_EMAIL_TO }}
      STAT_REPORT_EMAIL_TO: ${{ secrets.STAT_REPORT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install LibreOffice for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute report date
        id: report_date
        shell: bash
        run: |
          report_date="$(TZ=Asia/Shanghai date +%F)"
          echo "today=${report_date}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${report_date}"

      - name: Generate and email reports
        id: generate_report
        shell: bash
        run: |
          mkdir -p ./output
          set +e
          overall=0
          report_date="${{ steps.report_date.outputs.today }}"
          for profile in chemistry biology statistics; do
            echo "::group::Generate and email ${profile} report"
            python main.py --profile "${profile}" --report-date "${report_date}" --output-dir ./output
            status=$?
            echo "::endgroup::"
            if [ "$status" -ne 0 ] && [ "$overall" -eq 0 ]; then
              overall="$status"
            fi
          done
          echo "exit_code=${overall}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduled-email-test-output
          path: |
            ./output/*.docx
            ./output/*.pdf
          if-no-files-found: error
          retention-days: 7

      - name: Fail workflow when report generation failed
        if: always() && steps.generate_report.outputs.exit_code != '0'
        run: |
          code="${{ steps.generate_report.outputs.exit_code }}"
          if [ -z "$code" ]; then
            code=1
          fi
          echo "main.py exited with code ${code}"
          exit "$code"
