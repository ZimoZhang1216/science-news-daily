name: Cronjob Daily Research News

on:
  workflow_dispatch:
    inputs:
      report_date:
        description: "Optional report date in YYYY-MM-DD, defaults to Asia/Shanghai today"
        required: false
        default: ""
  repository_dispatch:
    types:
      - science-news-daily

permissions:
  contents: read

concurrency:
  group: cronjob-science-news-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate all target daily reports
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      EMAIL_ENABLED: "true"
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      CHEM_REPORT_EMAIL_TO: ${{ secrets.CHEM_REPORT_EMAIL_TO }}
      BIO_REPORT_EMAIL_TO: ${{ secrets.BIO_REPORT_EMAIL_TO }}
      STAT_REPORT_EMAIL_TO: ${{ secrets.STAT_REPORT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}

    steps:
      - name: Print trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_action=${{ github.event.action }}"
          echo "payload_report_date=${{ github.event.client_payload.report_date }}"
          echo "input_report_date=${{ inputs.report_date }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u)"
          echo "local_now=$(date)"

      - name: Check target email configuration
        shell: bash
        run: |
          missing=()
          for name in SMTP_HOST SMTP_USERNAME SMTP_PASSWORD REPORT_EMAIL_TO; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "${SMTP_FROM:-$SMTP_USERNAME}" ]; then
            missing+=("SMTP_FROM_or_SMTP_USERNAME")
          fi
          if [ -z "${CHEM_REPORT_EMAIL_TO:-$REPORT_EMAIL_TO}" ]; then
            missing+=("CHEM_REPORT_EMAIL_TO_or_REPORT_EMAIL_TO")
          fi
          if [ -z "${BIO_REPORT_EMAIL_TO:-$REPORT_EMAIL_TO}" ]; then
            missing+=("BIO_REPORT_EMAIL_TO_or_REPORT_EMAIL_TO")
          fi
          if [ -z "${STAT_REPORT_EMAIL_TO:-$REPORT_EMAIL_TO}" ]; then
            missing+=("STAT_REPORT_EMAIL_TO_or_REPORT_EMAIL_TO")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing cronjob target email configuration: ${missing[*]}"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install LibreOffice for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute report date
        id: report_date
        shell: bash
        run: |
          payload_report_date="${{ github.event.client_payload.report_date }}"
          input_report_date="${{ inputs.report_date }}"
          if [ -n "$payload_report_date" ]; then
            report_date="$payload_report_date"
          elif [ -n "$input_report_date" ]; then
            report_date="$input_report_date"
          else
            report_date="$(TZ=Asia/Shanghai date +%F)"
          fi
          echo "today=${report_date}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${report_date}"

      - name: Compute cronjob marker key
        id: marker_key
        shell: bash
        run: |
          key="cronjob-science-news-daily-${{ steps.report_date.outputs.today }}"
          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "Marker key: ${key}"

      - name: Restore cronjob run marker
        id: cronjob_marker
        if: github.event_name == 'repository_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: .daily-run-marker
          key: ${{ steps.marker_key.outputs.key }}

      - name: Skip duplicate cronjob run
        if: github.event_name == 'repository_dispatch' && steps.cronjob_marker.outputs.cache-hit == 'true'
        run: |
          echo "Cronjob daily reports for ${{ steps.report_date.outputs.today }} already completed; skipping duplicate dispatch."

      - name: Generate and email all target reports
        id: generate_report
        if: github.event_name != 'repository_dispatch' || steps.cronjob_marker.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ./output/logs
          set +e
          overall=0
          report_date="${{ steps.report_date.outputs.today }}"
          status_file="./output/cronjob_status_${report_date}.tsv"
          printf "profile\tstatus\texit_code\tstarted_at\tended_at\tlog_file\n" > "$status_file"
          for profile in chemistry biology statistics; do
            started_at="$(TZ=Asia/Shanghai date '+%F %T %Z')"
            log_file="./output/logs/${profile}_${report_date}.log"
            echo "::group::Generate ${profile} target report"
            python main.py --profile "${profile}" --report-date "${report_date}" --output-dir ./output --require-email --require-ai 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            echo "::endgroup::"
            ended_at="$(TZ=Asia/Shanghai date '+%F %T %Z')"
            if [ "$status" -eq 0 ]; then
              profile_status="success"
            else
              profile_status="failure"
            fi
            printf "%s\t%s\t%s\t%s\t%s\t%s\n" "$profile" "$profile_status" "$status" "$started_at" "$ended_at" "$log_file" >> "$status_file"
            if [ "$status" -ne 0 ] && [ "$overall" -eq 0 ]; then
              overall="$status"
            fi
          done
          echo "exit_code=${overall}" >> "$GITHUB_OUTPUT"
          echo "status_file=${status_file}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write cronjob run marker
        if: github.event_name == 'repository_dispatch' && steps.cronjob_marker.outputs.cache-hit != 'true' && steps.generate_report.outputs.exit_code == '0'
        run: |
          mkdir -p .daily-run-marker
          echo "${{ github.run_id }}" > ".daily-run-marker/${{ steps.report_date.outputs.today }}.txt"

      - name: Save cronjob run marker
        if: github.event_name == 'repository_dispatch' && steps.cronjob_marker.outputs.cache-hit != 'true' && steps.generate_report.outputs.exit_code == '0'
        uses: actions/cache/save@v4
        with:
          path: .daily-run-marker
          key: ${{ steps.marker_key.outputs.key }}

      - name: Email cronjob run log
        if: always() && steps.generate_report.outcome == 'success'
        run: |
          python send_run_log.py \
            --status-file "${{ steps.generate_report.outputs.status_file }}" \
            --report-date "${{ steps.report_date.outputs.today }}" \
            --workflow-name "Cronjob Daily Research News" \
            --event-name "${{ github.event_name }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --overall-exit-code "${{ steps.generate_report.outputs.exit_code }}"

      - name: Upload target report artifacts
        if: always() && steps.generate_report.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cronjob-science-news-daily-output
          path: |
            ./output/*.docx
            ./output/*.pdf
            ./output/*.tsv
            ./output/logs/*.log
          if-no-files-found: warn
          retention-days: 30

      - name: Fail workflow when cronjob reports failed
        if: always() && steps.generate_report.outcome == 'success' && steps.generate_report.outputs.exit_code != '0'
        run: |
          code="${{ steps.generate_report.outputs.exit_code }}"
          if [ -z "$code" ]; then
            code=1
          fi
          echo "main.py exited with code ${code}"
          exit "$code"
