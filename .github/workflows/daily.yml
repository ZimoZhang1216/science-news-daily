name: Daily Research News

on:
  workflow_dispatch:
    inputs:
      profiles:
        description: "Profiles to run: chemistry, biology, statistics, or comma-separated list"
        required: false
        default: "chemistry,biology,statistics"
      report_date:
        description: "Optional report date in YYYY-MM-DD, defaults to Asia/Shanghai today"
        required: false
        default: ""
  repository_dispatch:
    types:
      - daily-research-news
  schedule:
    # GitHub cron uses UTC. This is 08:15 Asia/Shanghai as a backup after the
    # external cron-job.org repository_dispatch trigger at 07:30 Asia/Shanghai.
    - cron: "15 0 * * *"

permissions:
  contents: read

concurrency:
  group: daily-research-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate research news daily
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EMAIL_ENABLED: "true"
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      CHEM_REPORT_EMAIL_TO: ${{ secrets.CHEM_REPORT_EMAIL_TO }}
      BIO_REPORT_EMAIL_TO: ${{ secrets.BIO_REPORT_EMAIL_TO }}
      STAT_REPORT_EMAIL_TO: ${{ secrets.STAT_REPORT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}

    steps:
      - name: Print trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "event_action=${{ github.event.action }}"
          echo "payload_report_date=${{ github.event.client_payload.report_date }}"
          echo "payload_profiles=${{ github.event.client_payload.profiles }}"
          echo "input_report_date=${{ inputs.report_date }}"
          echo "input_profiles=${{ inputs.profiles }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u)"
          echo "local_now=$(date)"

      - name: Check email configuration
        id: email_config
        shell: bash
        run: |
          missing=()
          for name in SMTP_HOST SMTP_USERNAME SMTP_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ -z "${SMTP_FROM:-$SMTP_USERNAME}" ]; then
            missing+=("SMTP_FROM_or_SMTP_USERNAME")
          fi
          if [ -z "${CHEM_REPORT_EMAIL_TO:-$REPORT_EMAIL_TO}" ]; then
            missing+=("CHEM_REPORT_EMAIL_TO_or_REPORT_EMAIL_TO")
          fi
          for name in BIO_REPORT_EMAIL_TO STAT_REPORT_EMAIL_TO; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -eq 0 ]; then
            echo "email_config=ready"
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "missing=" >> "$GITHUB_OUTPUT"
          else
            echo "email_config_missing=${missing[*]}"
            echo "::warning::Email configuration is incomplete: ${missing[*]}"
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "missing=${missing[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Require email configuration for online triggers
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.email_config.outputs.ready != 'true'
        run: |
          echo "Scheduled/repository_dispatch runs must send all report emails."
          echo "Missing email configuration: ${{ steps.email_config.outputs.missing }}"
          exit 1

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install LibreOffice for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute report date
        id: report_date
        shell: bash
        run: |
          payload_report_date="${{ github.event.client_payload.report_date }}"
          input_report_date="${{ inputs.report_date }}"
          if [ -n "$payload_report_date" ]; then
            report_date="$payload_report_date"
          elif [ -n "$input_report_date" ]; then
            report_date="$input_report_date"
          else
            report_date="$(TZ=Asia/Shanghai date +%F)"
          fi
          echo "today=${report_date}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${report_date}"

      - name: Compute report profiles
        id: report_profiles
        shell: bash
        run: |
          event_name="${{ github.event_name }}"
          if [ "$event_name" = "schedule" ] || [ "$event_name" = "repository_dispatch" ]; then
            raw_profiles="chemistry,biology,statistics"
            echo "Online trigger detected; forcing all report profiles regardless of dispatch payload."
          else
            raw_profiles="${{ inputs.profiles || 'chemistry,biology,statistics' }}"
          fi
          raw_profiles="${raw_profiles//,/ }"
          profiles=()
          for profile in $raw_profiles; do
            case "$profile" in
              chemistry|biology|statistics)
                profiles+=("$profile")
                ;;
              "")
                ;;
              *)
                echo "Unsupported profile: $profile" >&2
                exit 2
                ;;
            esac
          done
          if [ "${#profiles[@]}" -eq 0 ]; then
            profiles=(chemistry biology statistics)
          fi
          profile_string="${profiles[*]}"
          is_full_daily="false"
          if [ "$profile_string" = "chemistry biology statistics" ]; then
            is_full_daily="true"
          fi
          echo "profiles=${profile_string}" >> "$GITHUB_OUTPUT"
          echo "is_full_daily=${is_full_daily}" >> "$GITHUB_OUTPUT"
          echo "Profiles: ${profile_string}"
          echo "Full daily run: ${is_full_daily}"

      - name: Compute scheduled marker key
        id: marker_key
        shell: bash
        run: |
          profile_key="$(echo "${{ steps.report_profiles.outputs.profiles }}" | tr ' ' '-')"
          key="daily-research-news-${{ steps.report_date.outputs.today }}-${profile_key}"
          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "Marker key: ${key}"

      - name: Restore scheduled run marker
        id: scheduled_marker
        if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: .daily-run-marker
          key: ${{ steps.marker_key.outputs.key }}

      - name: Skip duplicate scheduled or dispatch run
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.scheduled_marker.outputs.cache-hit == 'true'
        run: |
          echo "Daily report for ${{ steps.report_date.outputs.today }} already generated; skipping duplicate scheduled/dispatch run."

      - name: Generate report
        id: generate_report
        if: (github.event_name != 'schedule' && github.event_name != 'repository_dispatch') || steps.scheduled_marker.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ./output
          set +e
          overall=0
          report_date="${{ steps.report_date.outputs.today }}"
          profiles="${{ steps.report_profiles.outputs.profiles }}"
          required_flags=(--require-ai)
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            required_flags+=(--require-email)
          fi
          for profile in $profiles; do
            echo "::group::Generate ${profile} report"
            python main.py --profile "${profile}" --report-date "${report_date}" --output-dir ./output "${required_flags[@]}"
            status=$?
            echo "::endgroup::"
            if [ "$status" -ne 0 ] && [ "$overall" -eq 0 ]; then
              overall="$status"
            fi
          done
          echo "exit_code=${overall}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write scheduled run marker
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.scheduled_marker.outputs.cache-hit != 'true' && steps.generate_report.outputs.exit_code == '0'
        run: |
          mkdir -p .daily-run-marker
          echo "${{ github.run_id }}" > ".daily-run-marker/${{ steps.report_date.outputs.today }}.txt"

      - name: Save scheduled run marker
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.scheduled_marker.outputs.cache-hit != 'true' && steps.generate_report.outputs.exit_code == '0'
        uses: actions/cache/save@v4
        with:
          path: .daily-run-marker
          key: ${{ steps.marker_key.outputs.key }}

      - name: Upload report artifacts
        if: always() && steps.generate_report.outcome != 'skipped' && ((github.event_name != 'schedule' && github.event_name != 'repository_dispatch') || steps.scheduled_marker.outputs.cache-hit != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: research-news-daily-output
          path: |
            ./output/*.docx
            ./output/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Fail workflow when report generation failed
        if: always() && steps.generate_report.outcome != 'skipped' && ((github.event_name != 'schedule' && github.event_name != 'repository_dispatch') || steps.scheduled_marker.outputs.cache-hit != 'true') && steps.generate_report.outputs.exit_code != '0'
        run: |
          code="${{ steps.generate_report.outputs.exit_code }}"
          if [ -z "$code" ]; then
            code=1
          fi
          echo "main.py exited with code ${code}"
          exit "$code"
