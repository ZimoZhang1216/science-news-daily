name: Daily Research News

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - daily-research-news
  schedule:
    # Backup trigger. cron-job.org repository_dispatch is the primary 07:30 Asia/Shanghai trigger.
    # If the external trigger fails, retry at 08:15 Asia/Shanghai.
    - cron: "15 0 * * *"

permissions:
  contents: read

concurrency:
  group: daily-research-news-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    name: Generate research news daily
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EMAIL_ENABLED: "true"
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
      CHEM_REPORT_EMAIL_TO: ${{ secrets.CHEM_REPORT_EMAIL_TO }}
      BIO_REPORT_EMAIL_TO: ${{ secrets.BIO_REPORT_EMAIL_TO }}
      STAT_REPORT_EMAIL_TO: ${{ secrets.STAT_REPORT_EMAIL_TO }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_FROM: ${{ secrets.SMTP_FROM }}
      SMTP_SECURITY: ${{ secrets.SMTP_SECURITY }}

    steps:
      - name: Print trigger info
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "event_schedule=${{ github.event.schedule }}"
          echo "event_action=${{ github.event.action }}"
          echo "payload_report_date=${{ github.event.client_payload.report_date }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u)"
          echo "local_now=$(date)"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install LibreOffice for PDF export
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-writer fonts-noto-cjk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute report date
        id: report_date
        shell: bash
        run: |
          payload_report_date="${{ github.event.client_payload.report_date }}"
          if [ -n "$payload_report_date" ]; then
            report_date="$payload_report_date"
          else
            report_date="$(TZ=Asia/Shanghai date +%F)"
          fi
          echo "today=${report_date}" >> "$GITHUB_OUTPUT"
          echo "Report date: ${report_date}"

      - name: Compute scheduled marker key
        id: marker_key
        shell: bash
        run: |
          key="daily-research-news-${{ steps.report_date.outputs.today }}"
          echo "key=${key}" >> "$GITHUB_OUTPUT"
          echo "Marker key: ${key}"

      - name: Restore scheduled run marker
        id: scheduled_marker
        if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: .daily-run-marker
          key: ${{ steps.marker_key.outputs.key }}

      - name: Skip duplicate scheduled run
        if: github.event_name == 'schedule' && steps.scheduled_marker.outputs.cache-hit == 'true'
        run: |
          echo "Daily report for ${{ steps.report_date.outputs.today }} already generated; skipping backup schedule."

      - name: Generate report
        id: generate_report
        if: github.event_name != 'schedule' || steps.scheduled_marker.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p ./output
          set +e
          overall=0
          report_date="${{ steps.report_date.outputs.today }}"
          for profile in chemistry biology statistics; do
            echo "::group::Generate ${profile} report"
            python main.py --profile "${profile}" --report-date "${report_date}" --output-dir ./output
            status=$?
            echo "::endgroup::"
            if [ "$status" -ne 0 ] && [ "$overall" -eq 0 ]; then
              overall="$status"
            fi
          done
          echo "exit_code=${overall}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Write scheduled run marker
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.scheduled_marker.outputs.cache-hit != 'true' && steps.generate_report.outputs.exit_code == '0'
        run: |
          mkdir -p .daily-run-marker
          echo "${{ github.run_id }}" > ".daily-run-marker/${{ steps.report_date.outputs.today }}.txt"

      - name: Save scheduled run marker
        if: (github.event_name == 'schedule' || github.event_name == 'repository_dispatch') && steps.scheduled_marker.outputs.cache-hit != 'true' && steps.generate_report.outputs.exit_code == '0'
        uses: actions/cache/save@v4
        with:
          path: .daily-run-marker
          key: ${{ steps.marker_key.outputs.key }}

      - name: Upload report artifacts
        if: always() && (github.event_name != 'schedule' || steps.scheduled_marker.outputs.cache-hit != 'true')
        uses: actions/upload-artifact@v4
        with:
          name: research-news-daily-output
          path: |
            ./output/*.docx
            ./output/*.pdf
          if-no-files-found: error
          retention-days: 30

      - name: Fail workflow when report generation failed
        if: always() && (github.event_name != 'schedule' || steps.scheduled_marker.outputs.cache-hit != 'true') && steps.generate_report.outputs.exit_code != '0'
        run: |
          code="${{ steps.generate_report.outputs.exit_code }}"
          if [ -z "$code" ]; then
            code=1
          fi
          echo "main.py exited with code ${code}"
          exit "$code"
